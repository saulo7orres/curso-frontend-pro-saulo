<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema Bagunçado v1.0 — Refatorado</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-10 font-sans">

    <h1 class="text-2xl font-bold mb-8 text-center text-slate-800">Cadastro de Loja (Refatorado)</h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">

        <div class="bg-white p-6 rounded-xl shadow">
            <h2 class="font-bold mb-4">Produtos</h2>
            <input type="text" id="input-produto" class="border p-2 w-full mb-2" placeholder="Nome do produto">
            <button id="btn-produto" class="bg-blue-500 text-white p-2 w-full rounded">Adicionar Produto</button>
            <ul id="lista-produtos" class="mt-4 text-sm text-slate-600"></ul>
        </div>

        <div class="bg-white p-6 rounded-xl shadow">
            <h2 class="font-bold mb-4">Clientes</h2>
            <input type="text" id="input-cliente" class="border p-2 w-full mb-2" placeholder="Nome do cliente">
            <button id="btn-cliente" class="bg-green-500 text-white p-2 w-full rounded">Adicionar Cliente</button>
            <ul id="lista-clientes" class="mt-4 text-sm text-slate-600"></ul>
        </div>

        <div class="bg-white p-6 rounded-xl shadow">
            <h2 class="font-bold mb-4">Fornecedores</h2>
            <input type="text" id="input-fornecedor" class="border p-2 w-full mb-2" placeholder="Nome do fornecedor">
            <button id="btn-fornecedor" class="bg-purple-500 text-white p-2 w-full rounded">Adicionar Fornecedor</button>
            <ul id="lista-fornecedores" class="mt-4 text-sm text-slate-600"></ul>
        </div>
    </div>

    <script>
        const produtos = [];
        const clientes = [];
        const fornecedores = [];

        const MIN_LENGTH = 5;

        function adicionarItem(idInput, idLista, arrayDados) {
            const inputEl = document.getElementById(idInput);
            const listaEl = document.getElementById(idLista);
            const valor = inputEl.value.trim();

            if (valor !== "" && valor.length >= MIN_LENGTH) {
                arrayDados.push(valor);
                const li = document.createElement('li');
                li.textContent = valor;
                listaEl.appendChild(li);
                inputEl.value = "";
                inputEl.focus();
            } else {
                alert(`Nome inválido! deve ter pelo menos ${MIN_LENGTH} caracteres.`);
            }
        }

        document.getElementById('btn-produto').addEventListener('click', () => adicionarItem('input-produto', 'lista-produtos', produtos));
        document.getElementById('btn-cliente').addEventListener('click', () => adicionarItem('input-cliente', 'lista-clientes', clientes));
        document.getElementById('btn-fornecedor').addEventListener('click', () => adicionarItem('input-fornecedor', 'lista-fornecedores', fornecedores));

        ['input-produto','input-cliente','input-fornecedor'].forEach(id => {
            document.getElementById(id).addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const mapping = {
                        'input-produto': ['lista-produtos', produtos],
                        'input-cliente': ['lista-clientes', clientes],
                        'input-fornecedor': ['lista-fornecedores', fornecedores]
                    };
                    const [idLista, arr] = mapping[id];
                    adicionarItem(id, idLista, arr);
                }
            });
        });
    </script>
</body>
</html>
